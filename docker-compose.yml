services:
  graphxr-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GRAPHXR_MCP_PORT:-8899}:8899"
    env_file:
      - .env
    environment:
      - GRAPHXR_WS_URL=${GRAPHXR_WS_URL:-ws://host.docker.internal:8080}
      - GRAPHXR_MCP_PORT=8899
      - MCP_TRANSPORT=http
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8899/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Optional: genai-toolbox for database sources (Neo4j, Spanner, PostgreSQL)
  # Start with: docker compose --profile toolbox up -d
  genai-toolbox:
    image: us-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:latest
    profiles:
      - toolbox
    ports:
      - "5000:5000"
    volumes:
      - ./config/tools.yaml:/app/tools.yaml:ro
      - ${GCLOUD_ADC_PATH:-${APPDATA}/gcloud/application_default_credentials.json}:/app/adc.json:ro
    command: ["--config", "/app/tools.yaml", "--address", "0.0.0.0", "--port", "5000"]
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/adc.json
      - NEO4J_URI=${NEO4J_URI:-bolt://host.docker.internal:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
      - GCP_PROJECT=${GCP_PROJECT:-}
      - SPANNER_INSTANCE=${SPANNER_INSTANCE:-}
      - SPANNER_DATABASE=${SPANNER_DATABASE:-}
      - POSTGRES_HOST=${POSTGRES_HOST:-host.docker.internal}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-}
      - POSTGRES_USER=${POSTGRES_USER:-}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-}
    restart: unless-stopped
