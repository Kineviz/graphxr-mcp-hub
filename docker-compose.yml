# docker-compose.yml — Production / end-user mode
#
# All services run in Docker. No local Node.js or gcloud required.
# Requires a service account key or ADC credentials file.
#
# Usage:
#   # Option 1: Service account key
#   GOOGLE_APPLICATION_CREDENTIALS=/path/to/key.json docker compose -f docker-compose.prod.yml up -d
#
#   # Option 2: Use .env file
#   cp .env.example .env  # fill in values
#   docker compose -f docker-compose.yml up -d

services:
  # 一次性初始化容器：在任何服务启动前，把镜像里 /app/config-defaults/ 的所有
  # 模板文件（hub_config.yaml / tools.yaml.example / ollama_config.ts 等）
  # 兜底复制到宿主机挂载的 ./config/。只对缺失的文件生效，不会覆盖用户已编辑的内容。
  #
  # 同时保证 tools.yaml 存在为「文件」形式：若宿主机缺失该路径，Docker 会默认
  # 把单文件 bind mount 当成目录创建，导致 genai-toolbox 读到的是目录而非文件，
  # 陷入崩溃循环。改用目录挂载 + 本初始化容器即可规避。
  config-init:
    image: kineviz/graphxr-mcp-server:latest
    volumes:
      - ./config:/app/config
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /app/config
        for src in /app/config-defaults/*; do
          [ -e "$$src" ] || continue
          name=$$(basename "$$src")
          dst="/app/config/$$name"
          if [ ! -e "$$dst" ]; then
            cp "$$src" "$$dst"
            echo "[config-init] Seeded $$dst from $$src"
          else
            echo "[config-init] $$dst already exists — leaving untouched"
          fi
        done
        if [ ! -f /app/config/tools.yaml ]; then
          printf 'sources: {}\ntools: {}\n' > /app/config/tools.yaml
          echo "[config-init] Created empty /app/config/tools.yaml"
        fi
    restart: "no"

  graphxr-mcp-server:
    image: kineviz/graphxr-mcp-server:latest
    ports:
      - "${GRAPHXR_MCP_PORT:-8899}:8899"
    env_file:
      - .env
    environment:
      - GRAPHXR_WS_URL=${GRAPHXR_WS_URL:-ws://host.docker.internal:8080}
      - GRAPHXR_MCP_PORT=8899
      - MCP_TRANSPORT=http
      - GENAI_TOOLBOX_URL=http://genai-toolbox:5000/mcp/sse
      - CLOUDSDK_CONFIG=/gcp/gcloud
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      # 共享宿主机 gcloud ADC 凭证 (与 genai-toolbox 服务相同)
      - ${CLOUDSDK_CONFIG:-${APPDATA:-${HOME}/.config}/gcloud}:/gcp/gcloud:ro
    depends_on:
      config-init:
        condition: service_completed_successfully
      genai-toolbox:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8899/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  genai-toolbox:
    image: us-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:latest
    ports:
      - "5000:5000"
    depends_on:
      config-init:
        condition: service_completed_successfully
    volumes:
      # 目录挂载（而不是单文件），避免宿主机文件缺失时被 Docker 误建为目录
      - ./config:/app/config:ro
      # 共享宿主机 gcloud ADC 凭证 (gcloud auth application-default login)
      # Windows: C:/Users/<user>/AppData/Roaming/gcloud
      # Linux/Mac: ~/.config/gcloud
      - ${CLOUDSDK_CONFIG:-${APPDATA:-${HOME}/.config}/gcloud}:/gcp/gcloud:ro
    command: ["--config", "/app/config/tools.yaml", "--address", "0.0.0.0", "--port", "5000"]
    environment:
      - CLOUDSDK_CONFIG=/gcp/gcloud
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/gcloud/application_default_credentials.json
      - NEO4J_URI=${NEO4J_URI:-bolt://host.docker.internal:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
      - GCP_PROJECT=${GCP_PROJECT:-}
      - SPANNER_INSTANCE=${SPANNER_INSTANCE:-}
      - SPANNER_DATABASE=${SPANNER_DATABASE:-}
      - POSTGRES_HOST=${POSTGRES_HOST:-host.docker.internal}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-}
      - POSTGRES_USER=${POSTGRES_USER:-}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-}
    restart: unless-stopped
