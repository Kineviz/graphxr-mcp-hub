# config/tools.yaml — genai-toolbox (MCP Toolbox for Databases) configuration
# This file is auto-managed by the Admin UI Database Templates feature.
# Manual edits are preserved when adding new sources via the UI.

sources:
  spanner:
    kind: spanner
    project: spanner-demo-2026
    instance: demo-2026
    database: paysim

tools:
  # Spanner — prebuilt tools
  spanner-execute-sql:
    kind: spanner-execute-sql
    source: spanner
    description: Execute SQL queries on Google Cloud Spanner (supports GRAPH_TABLE for property graph queries)

  spanner-list-tables:
    kind: spanner-list-tables
    source: spanner
    description: List tables in Spanner database

  spanner-list-graphs:
    kind: spanner-list-graphs
    source: spanner
    description: List property graphs in Spanner database
