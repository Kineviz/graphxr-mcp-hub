# config/tools.yaml — genai-toolbox 数据库配置
# 只有在 hub_config.yaml 中 toolbox.enabled=true 时才需要配置此文件

sources:
  neo4j:
    kind: neo4j
    uri: "${NEO4J_URI}"
    user: "${NEO4J_USER}"
    password: "${NEO4J_PASSWORD}"

  spanner:
    kind: spanner
    project: "${GCP_PROJECT}"
    instance: "${SPANNER_INSTANCE}"
    database: "${SPANNER_DATABASE}"

  postgres:
    kind: postgres
    host: "${POSTGRES_HOST:-localhost}"
    port: "${POSTGRES_PORT:-5432}"
    database: "${POSTGRES_DB}"
    user: "${POSTGRES_USER}"
    password: "${POSTGRES_PASSWORD}"

tools:
  neo4j-query:
    kind: neo4j-cypher
    source: neo4j
    description: "执行 Cypher 查询 Neo4j 图数据库"
    statement: "${cypher_query}"

  spanner-query:
    kind: spanner-sql
    source: spanner
    description: "执行 SQL 查询 Google Spanner"
    statement: "${sql_query}"

  postgres-query:
    kind: postgres-sql
    source: postgres
    description: "执行 SQL 查询 PostgreSQL"
    statement: "${sql_query}"
