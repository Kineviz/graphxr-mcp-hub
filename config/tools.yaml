sources:
  spanner:
    kind: spanner
    project: spanner-demo-2026
    instance: demo-2026
    database: paysim
tools:
  spanner-execute-sql:
    kind: spanner-execute-sql
    source: spanner
    description: Execute SQL queries on Google Cloud Spanner (supports GRAPH_TABLE
      for property graph queries)
  spanner-list-tables:
    kind: spanner-list-tables
    source: spanner
    description: List tables in Spanner database
  spanner-list-graphs:
    kind: spanner-list-graphs
    source: spanner
    description: List property graphs in Spanner database
  spanner-query-graph:
    kind: spanner-sql
    source: spanner
    description: Query property graph "graph_view" using GRAPH_TABLE() syntax in Spanner
    statement: SELECT * FROM GRAPH_TABLE(graph_view MATCH -[e]-> RETURN e LIMIT 100)
