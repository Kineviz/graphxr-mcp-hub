graphxr_mcp_server:
  enabled: true
  port: 8899
  graphxr_ws_url: ${GRAPHXR_WS_URL:-ws://localhost:8080}
  transport: http
duckdb:
  enabled: true
  transport: stdio
  command: uvx
  args:
    - mcp-server-duckdb
    - --db-path
    - ":memory:"
  description: CSV/JSON/Parquet 文件 SQL 查询（支持本地文件和 S3）
toolbox:
  enabled: false
  transport: sse
  url: ${GENAI_TOOLBOX_URL:-http://localhost:5000/sse}
  tools_file: config/tools.yaml
  description: Google genai-toolbox：Neo4j / Spanner / PostgreSQL / BigQuery 等
kafka:
  enabled: false
  ws_url: ${KAFKA_WS_URL:-ws://localhost:9092/ws}
  topics:
    - graph-events
  group_id: graphxr-mcp-hub
  batch_size: 10
  batch_timeout_ms: 5000
  transform:
    node_category: Event
    id_field: id
    include_metadata: true
  description: Kafka 实时流 → GraphXR（通过 WebSocket 代理）
ollama:
  enabled: false
  url: ${OLLAMA_URL:-http://localhost:11434}
  model: ${OLLAMA_MODEL:-llama3}
  description: Ollama 本地 LLM 后端（无需云端 API）
mcp_servers:
  - name: fetch
    enabled: true
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-fetch"
    description: HTTP REST API 抓取（按需接入）
  - name: github
    enabled: false
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ""
    description: GitHub 代码仓库访问（按需接入）
  - name: filesystem
    enabled: true
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /tmp
    description: Local filesystem access
