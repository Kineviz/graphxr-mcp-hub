# config/hub_config.yaml — GraphXR MCP Hub 总控配置
#
# 说明：
#   - GraphXR MCP Server 默认监听 localhost:8899
#   - GraphXR Agent（web 前端 chat 页面）和其他 LLM 客户端（Claude、Codex 等）
#     均可通过轮询 /health + /mcp-info 端口自动发现此服务，连接是可选的
#   - 其他数据源均为可选，按需开启

# ── GraphXR MCP Server（自实现，唯一必须运行的服务）─────────────────────────
graphxr_mcp_server:
  enabled: true
  # 默认端口 8899 — GraphXR Agent 前端会自动探测此端口
  port: 8899
  # GraphXR web 应用的 WebSocket 地址（GraphXR 运行时自动开启）
  graphxr_ws_url: "${GRAPHXR_WS_URL:-ws://localhost:8080}"
  # 传输模式: http (SSE, 供前端/浏览器使用) 或 stdio (供 CLI 工具使用)
  transport: http

# ── A. DuckDB MCP Server（CSV/JSON/Parquet 文件数据源）──────────────────────
duckdb:
  enabled: true
  transport: stdio
  command: "uvx"
  args: ["mcp-server-duckdb", "--db-path", ":memory:"]
  description: "CSV/JSON/Parquet 文件 SQL 查询（支持本地文件和 S3）"

# ── B. googleapis/genai-toolbox（数据库数据源）───────────────────────────────
toolbox:
  enabled: false               # 需要数据库时设为 true
  transport: sse
  url: "${GENAI_TOOLBOX_URL:-http://localhost:5000/sse}"
  tools_file: "config/tools.yaml"
  description: "Google genai-toolbox：Neo4j / Spanner / PostgreSQL / BigQuery 等"

# ── C. MCP Registry 按需加载 ─────────────────────────────────────────────────
mcp_servers:
  - name: filesystem
    enabled: true
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "${DATA_DIR:-./data}"]
    description: "本地文件读写"

  - name: fetch
    enabled: true
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-fetch"]
    description: "HTTP REST API 抓取"

  - name: github
    enabled: false             # 需要访问 GitHub 时设为 true
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
    description: "GitHub 代码仓库访问"

# ── D. 实时流数据源（Kafka / WebSocket）─────────────────────────────────────
# 启用后，LLM 可通过 stream_subscribe MCP 工具订阅实时 Kafka topic，
# 消息会增量推送到 GraphXR WebGL 画布。
streaming:
  enabled: false
  sources:
    - name: kafka-events
      enabled: false
      url: "${KAFKA_WS_URL:-ws://localhost:9092/topics/graph-events}"
      mode: incremental           # incremental | replace
      transform:
        nodeCategory: KafkaEvent
        idField: id
        targetField: null
        relationship: RELATED_TO
      description: "Kafka graph-events topic（通过 WebSocket bridge 接入）"

    - name: realtime-metrics
      enabled: false
      url: "${METRICS_WS_URL:-ws://localhost:9093/topics/metrics}"
      mode: replace
      transform:
        nodeCategory: Metric
        idField: metric_id
      description: "实时指标流（每条消息替换整图）"

# ── E. LLM 后端（可选，默认使用已连接的 MCP 客户端如 Claude / Codex）────────
# 配置 Ollama 后，可在无外网环境下用本地模型驱动 GraphXR Agent。
llm_backends:
  ollama:
    enabled: false
    url: "${OLLAMA_URL:-http://localhost:11434}"
    model: "${OLLAMA_MODEL:-llama3.2}"
    description: "Ollama 本地模型（llama3、mistral、qwen2.5 等）"
    # 可选：系统提示词覆盖
    # system_prompt: "你是 GraphXR 助手，可以操作知识图谱…"

