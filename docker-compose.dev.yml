# docker-compose.dev.yml — Development mode
#
# MCP Server runs locally (yarn dev), only genai-toolbox runs in Docker.
# ADC credentials are mounted from local gcloud config.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   yarn dev   # MCP server on localhost:8899

services:
  genai-toolbox:
    image: us-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:latest
    ports:
      - "5000:5000"
    volumes:
      - ./config/tools.yaml:/app/tools.yaml:ro
      # Windows: %APPDATA%/gcloud/  Linux/Mac: ~/.config/gcloud/
      - ${GCLOUD_ADC_PATH:-${APPDATA}/gcloud/application_default_credentials.json}:/app/adc.json:ro
    command: ["--config", "/app/tools.yaml", "--address", "0.0.0.0", "--port", "5000"]
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/adc.json
      - NEO4J_URI=${NEO4J_URI:-bolt://host.docker.internal:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
    restart: unless-stopped
